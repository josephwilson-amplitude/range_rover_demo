    <!-- Amplitude: Analytics + Session Replay + Web Experiment -->
    <script src="https://cdn.amplitude.com/script/c4c715e24914e241e41bcd0cb5a4c9f1.js"></script>
    <!-- Amplitude Guides & Surveys -->
    <script src="https://cdn.amplitude.com/script/c4c715e24914e241e41bcd0cb5a4c9f1.engagement.js"></script>
    <script>
      (function () {
        try {
          if (window.sessionReplay && window.amplitude) {
            window.amplitude.add(window.sessionReplay.plugin({
              sampleRate: 1,
              shouldInlineImages: true,
              recordCanvas: true,
              collectFonts: true,
              privacyConfig: {
                defaultMaskLevel: 'light',
                blockSelector: [],
                maskSelector: [],
                unmaskSelector: ['img', 'picture', 'video', 'source', '[style*="background-image"]'],
              },
            }));
          }
          if (window.engagement && window.amplitude) {
            window.amplitude.add(window.engagement.plugin());
          }
          if (window.amplitude) {
            window.amplitude.init("c4c715e24914e241e41bcd0cb5a4c9f1", {
              fetchRemoteConfig: true,
              autocapture: true,
            });
          }
        } catch (e) {
          console.warn("Amplitude init failed", e);
        }
      })();
    </script>
